<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: burlywood;
  color: white;
}

/* SECTION */
.gallery-section {
  padding: 80px 20px;
  text-align: center;
}

.gallery-section h2 {
  font-size: 38px;
  margin-bottom: 10px;
}

.gallery-section p {
  color:white;
  margin-bottom: 40px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

/* GRID */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  max-width: 1100px;
  margin: auto;
}

/* IMAGE BOX */
.gallery-item {
  overflow: hidden;
  border-radius: 10px;
  height: 220px;
  cursor: pointer;
}

/* IMAGE */
.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

/* HOVER EFFECT */
.gallery-item:hover img {
  transform: scale(1.1);
  filter: brightness(70%);
}
</style>

</head>

<body>

<section class="gallery-section">

  <h2>Our Gallery</h2>
  <p>Take a look at some of our fresh cuts, fades, and grooming styles.</p>

  <div class="gallery-grid">

    <div class="gallery-item">
      <img src="images (1).jpeg" alt="Haircut 1">
    </div>

    <div class="gallery-item">
      <img src="images (2).jpeg" alt="Haircut 2">
    </div>

    <div class="gallery-item">
      <img src="images (3).jpeg" alt="Haircut 3">
    </div>

    <div class="gallery-item">
      <img src="images (4).jpeg" alt="Haircut 4">
    </div>

    <div class="gallery-item">
      <img src="images (5).jpeg" alt="Haircut 5">
    </div>

    <div class="gallery-item">
      <img src="images (6).jpeg" alt="Haircut 6">
    </div>

    <div class="gallery-item">
      <img src="images (7).jpeg" alt="Haircut 6">
    </div>
    <div class="gallery-item">
      <img src="images (8).jpeg" alt="Haircut 6">
    </div>
    <div class="gallery-item">
      <img src="images (9).jpeg" alt="Haircut 6">
    </div>
    <div class="gallery-item">
      <img src="images (10).jpeg" alt="Haircut 6">
    </div>
    <div class="gallery-item">
      <img src="images (11).jpeg" alt="Haircut 6">
    </div>
  </div>

</section>

</body>
</html>
